services:

  nginx:
    container_name: nginx
    image: my-nginx
    build: ./requirements/nginx/
    env_file: .env
    restart: unless-stopped
    ports:
      - "443:443"
    networks:
      - inception
    volumes:
      - wordpress-volume:/var/www/html/
    depends_on:
      - wordpress

  mariadb:
    container_name: mariadb
    image: my-mariadb
    build: ./requirements/mariadb/
    env_file: .env
    restart: unless-stopped
    networks:
      - inception
    volumes:
      - mariadb-volume:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password

  wordpress:
    container_name: wordpress
    image: my-wordpress:php-fpm
    build: ./requirements/wordpress/
    env_file: .env
    restart: unless-stopped
    networks:
      - inception
    volumes:
      - wordpress-volume:/var/www/html/
    depends_on:
      - mariadb
    secrets:
      - db_password
      - wp_user_password
      - wp_root_password

volumes:
  wordpress-volume:
    driver: local
    driver_opts:
      device: /home/${USER}/data/wordpress
      o: bind
      type: none
  mariadb-volume:
    driver: local
    driver_opts:
      device: /home/${USER}/data/mariadb
      o: bind
      type: none

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/maria_db/db_password.txt
  db_root_password:
    file: ./secrets/maria_db/db_root_password.txt
  wp_user_password:
    file: ./secrets/wordpress/wp_user_password.txt
  wp_root_password:
    file: ./secrets/wp_root_password.txt
